name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller
          pip install -r requirements.in

      - name: Build app
        shell: pwsh
        run: |
          pyinstaller packaging/pyinstaller/al_husnain.spec --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc packaging/inno/al_husnain.iss /DMyAppVersion=$version

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-FileHash "packaging/inno/Output/*.exe" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)"
          } | Set-Content -Encoding ascii SHA256SUMS.txt

      - name: Ensure release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}"
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --verify-tag --title "${{ github.ref_name }}" --notes "Windows release ${{ github.ref_name }}"
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" packaging/inno/Output/*.exe SHA256SUMS.txt --clobber
