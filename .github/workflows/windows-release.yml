name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'requirements.in'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller pytest-qt
          pip install -r requirements.in

      - name: Update version file
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          "APP_VERSION = `"$version`"" | Out-File -Encoding ascii version.py

      - name: Validate package entry points
        shell: pwsh
        env:
          PYTHONPATH: ..
        run: |
          python -c "import inventory_management.main; import inventory_management.modules.dashboard.controller; import inventory_management.modules.product.controller; import inventory_management.modules.inventory.controller; import inventory_management.modules.purchase.controller; import inventory_management.modules.sales.controller; import inventory_management.modules.customer.controller; import inventory_management.modules.vendor.controller; import inventory_management.modules.expense.controller; import inventory_management.modules.reporting.controller; import inventory_management.modules.reporting.vendor_aging_reports; import inventory_management.modules.reporting.customer_aging_reports; import inventory_management.modules.reporting.inventory_reports; import inventory_management.modules.reporting.expense_reports; import inventory_management.modules.reporting.financial_reports; import inventory_management.modules.reporting.sales_reports; import inventory_management.modules.reporting.purchase_reports; import inventory_management.modules.reporting.payment_reports; import inventory_management.modules.reporting.enhanced_payment_reports; import inventory_management.modules.reporting.comprehensive_payments_reports; import inventory_management.modules.backup_restore; import inventory_management.modules.updater"

      - name: Run tests
        shell: pwsh
        env:
          PYTHONPATH: ..
        run: |
          python -m pytest

      - name: Build app
        shell: pwsh
        run: |
          pyinstaller packaging/pyinstaller/inventory_management.spec --noconfirm

      - name: Cache Chocolatey packages
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
          key: ${{ runner.os }}-choco-innosetup

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc packaging/inno/inventory_management.iss /DMyAppVersion=$version

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-FileHash "packaging/inno/Output/*.exe" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)"
          } | Set-Content -Encoding ascii SHA256SUMS.txt

      - name: Ensure release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag
          if ($LASTEXITCODE -ne 0) {
            $extraArgs = @()
            if ($tag.Contains("-")) {
              $extraArgs += "--prerelease"
            }
            gh release create $tag --verify-tag --title $tag --notes "Windows release $tag" @extraArgs
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" packaging/inno/Output/*.exe SHA256SUMS.txt --clobber
